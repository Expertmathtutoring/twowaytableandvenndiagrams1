<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mutually Exclusive Events, Two-way Tables & Venn Diagrams</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial, sans-serif; max-width: 840px; margin: 20px auto; background: #eef6fa; }
h1, h2 { color: #2980b9; text-align: center; }
.section { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #b1c7db4d; margin-bottom: 35px; padding: 20px; }
.flex { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
.label { font-weight: bold; margin-right: 8px; }
button { background: #2980b9; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; font-size: 1rem; cursor: pointer; margin-top: 12px; }
button:hover { background: #21618c; }
.input-small { width: 54px; }
.correct { color: green; font-weight: bold; }
.incorrect { color: red; font-weight: bold; }
.table-wrap { overflow-x: auto; margin-top: 16px; }
.table2 { border-collapse: collapse; width: 350px; background: #f9f9fa; }
.table2 th, .table2 td { border: 1px solid #ddd; padding: 8px; text-align: center; }
.table2 th { background: #d4e6f1; }
.venn-wrap { width: 420px; height: 300px; margin: 0 auto;}
@media (max-width: 600px){
  .venn-wrap { width: 99vw; height: 220px;}
  .table2 { width: 96vw;}
  .flex { flex-direction: column; }
}
</style>
</head>
<body>
<h1>Mutually Exclusive Events, Two-way Tables & Venn Diagrams</h1>

<div class="section" id="exclusive-section">
  <h2>1. Mutually vs Non-Mutually Exclusive Events</h2>
  <div class="flex">
    <div>
      <div id="event-desc"></div>
      <button id="new-event">New Example</button>
      <button id="reset-event">Reset</button>
      <form id="exclusive-form" style="margin-top:12px;">
        <label class="label">Are these events mutually exclusive?</label>
        <input type="radio" name="exclusive" value="mutual" id="mutual" required>
        <label for="mutual">Yes</label>
        <input type="radio" name="exclusive" value="non-mutual" id="non-mutual">
        <label for="non-mutual">No</label>
        <button type="submit">Submit</button>
      </form>
      <div id="exclusive-feedback"></div>
    </div>
  </div>
</div>

<div class="section" id="table-section">
  <h2>2. Two-way Table Activity</h2>
  <div>
    <div id="table-desc"></div>
    <button id="new-table">New Table</button>
    <button id="reset-table">Reset</button>
    <div class="table-wrap">
      <table class="table2" id="table2">
        <tr>
          <th></th>
          <th id="colHead1"></th>
          <th id="colHead2"></th>
        </tr>
        <tr>
          <th id="rowHead1"></th>
          <td><input class="input-small" id="cell11" type="number"></td>
          <td><input class="input-small" id="cell12" type="number"></td>
        </tr>
        <tr>
          <th id="rowHead2"></th>
          <td><input class="input-small" id="cell21" type="number"></td>
          <td><input class="input-small" id="cell22" type="number"></td>
        </tr>
      </table>
    </div>
    <button id="table-check">Submit Table</button>
    <div id="table-feedback"></div>
  </div>
</div>

<div class="section" id="venn-section">
  <h2>3. Venn Diagram Interactive</h2>
  <div>
    <div id="venn-desc"></div>
    <button id="new-venn">New Venn</button>
    <button id="reset-venn">Reset</button>
    <div class="venn-wrap" id="venn-plot"></div>
    <form id="venn-form">
      <label class="label">How many are in both sets (overlap)?</label>
      <input type="number" id="venn-overlap" required>
      <button type="submit">Submit Answer</button>
    </form>
    <div id="venn-feedback"></div>
  </div>
</div>

<script>
// --- EVENTS ---
const eventExamples = [
  {desc:"Rolling a die: Event A is getting an even number, Event B is getting an odd number.", mutual:true},
  {desc:"Drawing a card: Event A is getting a red card, Event B is getting a King.", mutual:false},
  {desc:"Flipping a coin: Event A is getting heads, Event B is getting tails.", mutual:true},
  {desc:"Picking a student: Event A is a girl, Event B is a student who wears glasses.", mutual:false},
  {desc:"Choosing a day: Event A is a weekend, Event B is a day starting with 'S'.", mutual:false},
  {desc:"Drawing a marble: Event A is blue, Event B is green.", mutual:true},
  {desc:"Selecting a pet: Event A is a dog, Event B is a large animal.", mutual:false}
];

function newEventExample(){
  const idx = Math.floor(Math.random()*eventExamples.length);
  const example = eventExamples[idx];
  document.getElementById('event-desc').innerHTML = "<b>"+example.desc+"</b>";
  document.getElementById('exclusive-form').reset();
  document.getElementById('exclusive-feedback').textContent = "";
  exclusiveCurrent = example.mutual;
}
document.getElementById('new-event').onclick = newEventExample;
document.getElementById('reset-event').onclick = function(){
  document.getElementById('exclusive-form').reset();
  document.getElementById('exclusive-feedback').textContent = "";
};
let exclusiveCurrent=true;
document.getElementById('exclusive-form').onsubmit = function(e){
  e.preventDefault();
  const val = document.querySelector('input[name="exclusive"]:checked');
  const feedback = document.getElementById('exclusive-feedback');
  if(val){
    if((val.value === "mutual" && exclusiveCurrent) ||
       (val.value === "non-mutual" && !exclusiveCurrent)){
      feedback.innerHTML = "<span class='correct'>🎉 Correct!</span>";
    } else {
      feedback.innerHTML = "<span class='incorrect'>❌ Not correct. Try again!</span>";
    }
  }
}
newEventExample();

// --- TABLE ACTIVITY ---
const tableExamples = [
  {
    desc:"Fill in the table for 'Favorite Fruit vs Likes Chocolate'.",
    rowHeads:["Apple","Banana"], colHeads:["Likes Chocolate","Doesn't Like Chocolate"],
    matrix:[[8,3],[5,4]]
  },
  {
    desc:"Fill in the table for 'Season vs Likes Swimming'.",
    rowHeads:["Summer","Winter"],colHeads:["Likes Swimming","Doesn't Like Swimming"],
    matrix:[[10,2],[3,8]]
  },
  {
    desc:"Fill in the table for 'Gender vs Likes Pizza'.",
    rowHeads:["Boy","Girl"],colHeads:["Likes Pizza","Doesn't Like Pizza"],
    matrix:[[9,4],[7,5]]
  }
];

let tableIdx = 0;
function newTableExample() {
  tableIdx = Math.floor(Math.random()*tableExamples.length);
  const ex = tableExamples[tableIdx];
  document.getElementById('table-desc').innerHTML = "<b>"+ex.desc+"</b>";
  document.getElementById('rowHead1').textContent = ex.rowHeads[0];
  document.getElementById('rowHead2').textContent = ex.rowHeads[1];
  document.getElementById('colHead1').textContent = ex.colHeads[0];
  document.getElementById('colHead2').textContent = ex.colHeads[1];
  ["cell11","cell12","cell21","cell22"].forEach(id => document.getElementById(id).value = "");
  document.getElementById('table-feedback').textContent = "";
}
document.getElementById('new-table').onclick=newTableExample;
document.getElementById('reset-table').onclick=function(){
  ["cell11","cell12","cell21","cell22"].forEach(id => document.getElementById(id).value = "");
  document.getElementById('table-feedback').textContent = "";
};
document.getElementById('table-check').onclick=function(){
  const ex = tableExamples[tableIdx];
  let correct = true;
  correct &= (parseInt(document.getElementById('cell11').value) === ex.matrix[0][0]);
  correct &= (parseInt(document.getElementById('cell12').value) === ex.matrix[0][1]);
  correct &= (parseInt(document.getElementById('cell21').value) === ex.matrix[1][0]);
  correct &= (parseInt(document.getElementById('cell22').value) === ex.matrix[1][1]);
  const feedback = document.getElementById('table-feedback');
  if(correct){
    feedback.innerHTML = "<span class='correct'>🎉 Correct!</span>";
  }else{
    feedback.innerHTML = "<span class='incorrect'>❌ Some values are not correct. Try again!</span>";
  }
};
newTableExample();

// --- VENN DIAGRAM ---
function randomVennData(){
  // Simple random values for sets
  let total = Math.floor(Math.random()*18)+12; // 12 to 29
  let A = Math.floor(Math.random()*total/2)+4; // 4 to half of total
  let B = Math.floor(Math.random()*total/2)+4;
  let overlap = Math.floor(Math.min(A,B)/2)+1; // at least 1 in the overlap, at most min(A,B)/2
  return {total, A, B, overlap};
}
let vennData = randomVennData();

function drawVenn(){
  const {A,B,overlap,total} = vennData;
  // Plotly traces for Venn circles
  let traceA = {
    x:[1], y:[1.5], text:`A<br>${A}`, mode:'text', name:'A', textfont:{size:20}, showlegend:false
  };
  let traceB = {
    x:[2], y:[1.5], text:`B<br>${B}`, mode:'text', name:'B', textfont:{size:20}, showlegend:false
  };
  let traceOverlap = {
    x:[1.5], y:[1.5], text:`Overlap<br>${overlap}`,mode:'text', name:'Overlap', textfont:{size:18}, showlegend:false
  };
  // Draw circles as shapes
  let shapeA = {type:'circle', xref:'x', yref:'y', x0:0.7, y0:1, x1:1.7, y1:2, line:{color:'#5dade2', width:3}, fillcolor:'rgba(33,150,243,0.1)'};
  let shapeB = {type:'circle', xref:'x', yref:'y', x0:1.3, y0:1, x1:2.3, y1:2, line:{color:'#52be80', width:3}, fillcolor:'rgba(46,204,113,0.1)'};
  Plotly.newPlot('venn-plot', [traceA, traceB, traceOverlap], {
    title:"Venn Diagram",
    xaxis:{range:[0,3], showgrid:false, zeroline:false, showticklabels:false},
    yaxis:{range:[0,3], showgrid:false, zeroline:false, showticklabels:false},
    shapes:[shapeA, shapeB],
    margin:{t:60,l:0,r:0,b:0}
  });
}
function newVenn(){
  vennData = randomVennData();
  drawVenn();
  document.getElementById('venn-desc').innerHTML =
    `<b>There are ${vennData.total} people in total.<br>
    Set A has ${vennData.A} people.<br>
    Set B has ${vennData.B} people.<br>
    Some are in both sets.</b>`;
  document.getElementById('venn-form').reset();
  document.getElementById('venn-feedback').textContent = "";
}
document.getElementById('new-venn').onclick=newVenn;
document.getElementById('reset-venn').onclick=function(){
  document.getElementById('venn-form').reset();
  document.getElementById('venn-feedback').textContent = "";
};
document.getElementById('venn-form').onsubmit=function(e){
  e.preventDefault();
  const guess = parseInt(document.getElementById('venn-overlap').value);
  if(guess === vennData.overlap){
    document.getElementById('venn-feedback').innerHTML = "<span class='correct'>🎉 Correct!</span>";
  } else {
    document.getElementById('venn-feedback').innerHTML = "<span class='incorrect'>❌ Not right. Try again!</span>";
  }
};
newVenn();
</script>
</body>
</html>
