  <h2>2. Two-way Table Activity</h2>
  <div>
    <div id="table-desc"></div>
    <button id="show-hint-table" type="button">Show Hint</button>
    <div id="hint-table" class="hint-box">
      <strong>Hint:</strong> Read carefully the categories for rows and columns. Fill in the table by entering the number of individuals in each group. Double check if the sum of rows and columns make logical sense.
    </div>
    <button id="new-table">New Table</button>
    <button id="reset-table">Reset</button>
    <div class="table-wrap">
      <table class="table2" id="table2" aria-label="Two-way table with totals">
        <tr>
          <th></th>
          <th id="colHead1"></th>
          <th id="colHead2"></th>
          <th>Total</th>
        </tr>
        <tr>
          <th id="rowHead1"></th>
          <td><input class="input-small" id="cell11" type="number" min="0"></td>
          <td><input class="input-small" id="cell12" type="number" min="0"></td>
          <td><input class="input-small" id="rowTotal1" type="number" readonly></td>
        </tr>
        <tr>
          <th id="rowHead2"></th>
          <td><input class="input-small" id="cell21" type="number" min="0"></td>
          <td><input class="input-small" id="cell22" type="number" min="0"></td>
          <td><input class="input-small" id="rowTotal2" type="number" readonly></td>
        </tr>
        <tr>
          <th>Total</th>
          <td><input class="input-small" id="colTotal1" type="number" readonly></td>
          <td><input class="input-small" id="colTotal2" type="number" readonly></td>
          <td><input class="input-small" id="grandTotal" type="number" readonly></td>
        </tr>
      </table>
    </div>
    <button id="table-check">Submit Table</button>
    <div id="table-feedback"></div>
  </div>
</div>
