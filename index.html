<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Two-way Table & Venn Diagram Interactive Activities</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; max-width: 860px; margin: 20px auto; background: #eef6fa; }
  h1, h2 { color: #2980b9; text-align: center; }
  .section { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #b1c7db4d; margin-bottom: 35px; padding: 20px; }
  .flex { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .label { font-weight: bold; margin-right: 8px; }
  button { background: #2980b9; color: #fff; border: none; border-radius: 5px; padding: 8px 18px; font-size: 1rem; cursor: pointer; margin-top: 12px; }
  button:hover { background: #21618c; }
  .input-small { width: 54px; }
  .correct { color: green; font-weight: bold; }
  .incorrect { color: red; font-weight: bold; }
  .table-wrap { overflow-x: auto; margin-top: 16px; }
  .table2 { border-collapse: collapse; width: 380px; background: #f9f9fa; }
  .table2 th, .table2 td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; font-weight: normal; }
  .table2 th { background: #d4e6f1; font-weight: bold; }
  .table2 td.total-cell, .table2 th.total-cell { background: #f7ca18; color: #34495e; font-weight: bold; }
  .venn-wrap { width: 460px; height: 300px; margin: 0 auto;}
  .questions { margin-top: 20px; }
  .question-item { margin-bottom: 12px; }
  label.inline {display: inline-block; margin-right: 8px; font-weight: normal;}
  @media (max-width: 680px){
    .venn-wrap { width: 98vw; height: 220px; }
    .table2 { width: 96vw; }
  }
</style>
</head>
<body>
<h1>Two-way Table & Venn Diagram Interactive Activities</h1>

<!-- Two-way Table Section -->
<div class="section" id="table-section">
  <h2>1. Two-way Table Activity</h2>
  <div>
    <div id="table-desc" style="font-weight:bold; margin-bottom:8px;"></div>
    <button id="new-table">New Table</button>
    <button id="reset-table">Reset Values</button>
    <div class="table-wrap" style="margin-top:8px;">
      <table class="table2" id="table2" aria-label="Two-way frequency table with totals">
        <thead>
          <tr>
            <th scope="col"></th>
            <th scope="col" id="colHead1"></th>
            <th scope="col" id="colHead2"></th>
            <th scope="col" class="total-cell">Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th scope="row" id="rowHead1"></th>
            <td><input class="input-small cell-input" id="cell11" type="number" min="0" aria-label="Cell 1,1"></td>
            <td><input class="input-small cell-input" id="cell12" type="number" min="0" aria-label="Cell 1,2"></td>
            <td class="total-cell" id="rowTotal1" aria-live="polite" aria-atomic="true">0</td>
          </tr>
          <tr>
            <th scope="row" id="rowHead2"></th>
            <td><input class="input-small cell-input" id="cell21" type="number" min="0" aria-label="Cell 2,1"></td>
            <td><input class="input-small cell-input" id="cell22" type="number" min="0" aria-label="Cell 2,2"></td>
            <td class="total-cell" id="rowTotal2" aria-live="polite" aria-atomic="true">0</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th class="total-cell">Total</th>
            <td class="total-cell" id="colTotal1" aria-live="polite" aria-atomic="true">0</td>
            <td class="total-cell" id="colTotal2" aria-live="polite" aria-atomic="true">0</td>
            <td class="total-cell" id="grandTotal" aria-live="polite" aria-atomic="true">0</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <button id="table-submit" style="margin-top:12px;">Submit Table Answers</button>
    <div id="table-feedback" role="alert" aria-live="assertive" style="margin-top:10px;"></div>
    <div id="table-questions" class="questions" aria-live="polite" style="margin-top:20px;"></div>
  </div>
</div>

<!-- Venn Diagram Section -->
<div class="section" id="venn-section">
  <h2>2. Venn Diagram Interactive</h2>
  <div>
    <div id="venn-desc" aria-live="polite" aria-atomic="true" style="font-weight:bold; margin-bottom:12px;"></div>
    <button id="new-venn">New Venn Diagram</button>
    <button id="reset-venn">Reset Venn Answer</button>
    <div class="venn-wrap" id="venn-plot" aria-label="Venn diagram plot"></div>
    <form id="venn-form" aria-describedby="venn-desc" style="margin-top:10px;">
      <label class="label" for="venn-overlap">How many are in both sets (overlap)?</label>
      <input type="number" id="venn-overlap" required min="0" step="1" aria-required="true" />
      <button type="submit">Submit Answer</button>
    </form>
    <div id="venn-feedback" role="alert" aria-live="assertive" style="margin-top:8px;"></div>
    <div id="venn-questions" class="questions" aria-live="polite" style="margin-top:20px;"></div>
  </div>
</div>

<script>
// --- Two-way Table Activity ---
const tableExamples = [
  {
    desc: "Favorite Fruit vs Likes Chocolate",
    rowHeads: ["Apple", "Banana"],
    colHeads: ["Likes Chocolate", "Doesn't Like Chocolate"],
    matrix: [[8,3],[5,4]]
  },
  {
    desc: "Season vs Likes Swimming",
    rowHeads: ["Summer", "Winter"],
    colHeads: ["Likes Swimming", "Doesn't Like Swimming"],
    matrix: [[10,2],[3,8]]
  },
  {
    desc: "Gender vs Likes Pizza",
    rowHeads: ["Boy", "Girl"],
    colHeads: ["Likes Pizza", "Doesn't Like Pizza"],
    matrix: [[9,4],[7,5]]
  }
];

let tableIdx = 0;

function newTableExample() {
  tableIdx = Math.floor(Math.random()*tableExamples.length);
  const ex = tableExamples[tableIdx];
  document.getElementById('table-desc').textContent = ex.desc;
  document.getElementById('rowHead1').textContent = ex.rowHeads[0];
  document.getElementById('rowHead2').textContent = ex.rowHeads[1];
  document.getElementById('colHead1').textContent = ex.colHeads[0];
  document.getElementById('colHead2').textContent = ex.colHeads[1];

  ["cell11","cell12","cell21","cell22"].forEach(id => document.getElementById(id).value = "");
  updateTotals();
  document.getElementById('table-feedback').textContent = "";
  document.getElementById('table-questions').innerHTML = "";
}

function getCellNumber(id){
  const val = parseInt(document.getElementById(id).value);
  return (isNaN(val) || val < 0) ? 0 : val;
}

function updateTotals(){
  const c11 = getCellNumber("cell11"),
        c12 = getCellNumber("cell12"),
        c21 = getCellNumber("cell21"),
        c22 = getCellNumber("cell22");

  const row1 = c11 + c12,
        row2 = c21 + c22,
        col1 = c11 + c21,
        col2 = c12 + c22,
        grand = row1 + row2;

  document.getElementById('rowTotal1').textContent = row1;
  document.getElementById('rowTotal2').textContent = row2;
  document.getElementById('colTotal1').textContent = col1;
  document.getElementById('colTotal2').textContent = col2;
  document.getElementById('grandTotal').textContent = grand;
}

["cell11","cell12","cell21","cell22"].forEach(id => {
  document.getElementById(id).addEventListener('input', updateTotals);
});

function generateTableQuestions(){
  const ex = tableExamples[tableIdx];
  const c11 = getCellNumber("cell11"),
        c12 = getCellNumber("cell12"),
        c21 = getCellNumber("cell21"),
        c22 = getCellNumber("cell22");

  const questionsDiv = document.getElementById('table-questions');
  questionsDiv.innerHTML = "";

  const qdata = [
    {
      question: `How many have <b>${ex.rowHeads[0]}</b> AND <b>${ex.colHeads[0]}</b>?`,
      correct: c11,
      id: 'q1'
    },
    {
      question: `How many have <b>${ex.rowHeads[0]}</b> AND <b>${ex.colHeads[1]}</b>?`,
      correct: c12,
      id: 'q2'
    },
    {
      question: `How many have <b>${ex.rowHeads[1]}</b> AND <b>${ex.colHeads[0]}</b>?`,
      correct: c21,
      id: 'q3'
    },
    {
      question: `How many have <b>${ex.rowHeads[1]}</b> AND <b>${ex.colHeads[1]}</b>?`,
      correct: c22,
      id: 'q4'
    },
    {
      question: `What is the total number of people?`,
      correct: c11 + c12 + c21 + c22,
      id: 'q5'
    }
  ];

  qdata.forEach(({question, correct, id}) => {
    const qItem = document.createElement('div');
    qItem.className = 'question-item';
    qItem.innerHTML =
    `
      <label for="${id}_input" class="inline">${question}</label>
      <input type="number" min="0" id="${id}_input" aria-label="${question}"/>
      <button aria-label="Check answer for question: ${question}" type="button" data-qid="${id}">Check</button>
      <span id="${id}_feedback" role="alert" aria-live="assertive" style="margin-left:8px;"></span>
    `;
    questionsDiv.appendChild(qItem);
  });

  questionsDiv.querySelectorAll('button').forEach(btn => {
    btn.onclick = function(){
      const qid = btn.getAttribute('data-qid');
      const input = document.getElementById(qid + '_input');
      const userAnswer = parseInt(input.value);
      const feedbackEl = document.getElementById(qid + '_feedback');
      const correctAnswer = qdata.find(q=>q.id === qid).correct;
      if (isNaN(userAnswer)) {
        feedbackEl.textContent = "Please enter a number.";
        feedbackEl.className = "incorrect";
        return;
      }
      if (userAnswer === correctAnswer) {
        feedbackEl.textContent = "🎉 Correct!";
        feedbackEl.className = "correct";
      } else {
        feedbackEl.textContent = `❌ Incorrect, try again.`;
        feedbackEl.className = "incorrect";
      }
    };
  });
}

document.getElementById('table-submit').onclick = function(){
  const c11Val = document.getElementById("cell11").value;
  const c12Val = document.getElementById("cell12").value;
  const c21Val = document.getElementById("cell21").value;
  const c22Val = document.getElementById("cell22").value;
  if ([c11Val, c12Val, c21Val, c22Val].some(v => v.trim() === "")) {
    document.getElementById('table-feedback').textContent = "Please fill all cells before submitting.";
    document.getElementById('table-feedback').className = "incorrect";
    return;
  }
  document.getElementById('table-feedback').textContent = "Questions generated based on your table. Please answer below.";
  document.getElementById('table-feedback').className = "correct";
  generateTableQuestions();
};

document.getElementById('new-table').onclick = newTableExample;
document.getElementById('reset-table').onclick = () => {
  ["cell11","cell12","cell21","cell22"].forEach(id => document.getElementById(id).value = "");
  updateTotals();
  document.getElementById('table-feedback').textContent = "";
  document.getElementById('table-questions').innerHTML = "";
};

newTableExample();

// --- VENN DIAGRAM ---

function randomVennData(){
  let total = Math.floor(Math.random()*18)+20; 
  let Aonly = Math.floor(Math.random()*(total/2-4)) + 3;
  let Bonly = Math.floor(Math.random()*(total/2-4)) + 3;
  let overlapMax = total - (Aonly + Bonly);
  if (overlapMax < 3) overlapMax = 3;
  let overlap = Math.floor(Math.random()*(overlapMax-2)) + 2;
  const neither = total - (Aonly + Bonly + overlap);
  return { total, Aonly, Bonly, overlap, neither };
}

let vennData = null;

function drawVenn() {
  const { Aonly, Bonly, overlap, neither } = vennData;

  const setATotal = Aonly + overlap;
  const setBTotal = Bonly + overlap;

  const layout = {
    xaxis: { range: [0, 4], showgrid: false, zeroline: false, showticklabels: false },
    yaxis: { range: [0, 3], showgrid: false, zeroline: false, showticklabels: false },
    shapes: [
      { type: 'rect', xref: 'x', yref: 'y', x0: 0.2, y0: 0.4, x1: 3.8, y1: 2.6,
        line: { color: '#7f8c8d', width: 2 }, fillcolor: 'rgba(200,200,200,0.15)', layer: 'below'
      },
      { type: 'circle', xref: 'x', yref: 'y', x0: 0.8, y0: 0.8, x1: 2.4, y1: 2.4,
        line: { color: '#2980b9', width: 3 }, fillcolor: 'rgba(41,128,185,0.15)', layer: 'below'
      },
      { type: 'circle', xref: 'x', yref: 'y', x0: 1.6, y0: 0.8, x1: 3.2, y1: 2.4,
        line: { color: '#27ae60', width: 3 }, fillcolor: 'rgba(39,174,96,0.15)', layer: 'below'
      }
    ],
    margin: { t: 60, l: 40, r: 40, b: 40 },
    showlegend: false,
    annotations: [
      { x: 1.1, y: 1.85, text: `A only:<br><b>${Aonly}</b>`, showarrow: false, font: { color: '#2980b9', size: 14 } },
      { x: 2.9, y: 1.85, text: `B only:<br><b>${Bonly}</b>`, showarrow: false, font: { color: '#27ae60', size: 14 } },
      { x: 2.0, y: 1.5, text: `Both:<br><b>${overlap}</b>`, showarrow: false, font: { color: '#b7950b', size: 14 } },

      { x: 0.4, y: 2.5, text: `Total:<br><b>${vennData.total}</b>`, showarrow: false, font: { color: '#7f8c8d', size: 16, family: 'Arial Black' } },
      { x: 0.95, y: 2.5, text: `Set A total:<br><b>${setATotal}</b>`, showarrow: false, font: { color: '#2980b9', size: 14 } },
      { x: 2.9, y: 2.5, text: `Set B total:<br><b>${setBTotal}</b>`, showarrow: false, font: { color: '#27ae60', size: 14 } },
      { x: 3.4, y: 0.5, text: `Complement (Neither):<br><b>${neither}</b>`, showarrow: false, font: { color: '#7f8c8d', size: 14 } }
    ]
  };

  Plotly.newPlot('venn-plot', [], layout, {displayModeBar: false, responsive: true});
}

// Generate probability questions based on vennData
function generateVennProbabilityQuestions() {
  const { total, Aonly, Bonly, overlap, neither } = vennData;
  const setATotal = Aonly + overlap;
  const setBTotal = Bonly + overlap;

  const questionsDiv = document.getElementById('venn-questions');
  questionsDiv.innerHTML = "";

  const qdata = [
    {
      question: `What is the probability that a randomly chosen person is in Set A only? (i.e. in A but not in B)`,
      correct: (Aonly / total).toFixed(3),
      id: 'v1'
    },
    {
      question: `What is the probability that a randomly chosen person is in Set B only? (i.e. in B but not in A)`,
      correct: (Bonly / total).toFixed(3),
      id: 'v2'
    },
    {
      question: `What is the probability that a randomly chosen person is in both Set A and Set B?`,
      correct: (overlap / total).toFixed(3),
      id: 'v3'
    },
    {
      question: `What is the probability that a randomly chosen person is in Set A (including those also in B)?`,
      correct: (setATotal / total).toFixed(3),
      id: 'v4'
    },
    {
      question: `What is the probability that a randomly chosen person is in Set B (including those also in A)?`,
      correct: (setBTotal / total).toFixed(3),
      id: 'v5'
    },
    {
      question: `What is the probability that a randomly chosen person is in neither set?`,
      correct: (neither / total).toFixed(3),
      id: 'v6'
    }
  ];

  qdata.forEach(({question, correct, id}) => {
    const qItem = document.createElement('div');
    qItem.className = 'question-item';
    qItem.innerHTML =
    `
      <label for="${id}_input" class="inline">${question}</label>
      <input type="text" id="${id}_input" placeholder="e.g. 0.123" aria-label="${question}" />
      <button aria-label="Check answer for question: ${question}" type="button" data-qid="${id}">Check</button>
      <span id="${id}_feedback" role="alert" aria-live="assertive" style="margin-left:8px;"></span>
    `;
    questionsDiv.appendChild(qItem);
  });

  questionsDiv.querySelectorAll('button').forEach(btn => {
    btn.onclick = function(){
      const qid = btn.getAttribute('data-qid');
      const input = document.getElementById(qid + '_input');
      const userAnswerRaw = input.value.trim();
      const feedbackEl = document.getElementById(qid + '_feedback');
      const correctAnswer = parseFloat(qdata.find(q=>q.id === qid).correct);
      const userAnswer = parseFloat(userAnswerRaw);
      if (userAnswerRaw === "") {
        feedbackEl.textContent = "Please enter a probability.";
        feedbackEl.className = "incorrect";
        return;
      }
      if (isNaN(userAnswer) || userAnswer < 0 || userAnswer > 1) {
        feedbackEl.textContent = "Please enter a valid probability between 0 and 1.";
        feedbackEl.className = "incorrect";
        return;
      }
      if (Math.abs(userAnswer - correctAnswer) <= 0.005) {
        feedbackEl.textContent = "🎉 Correct!";
        feedbackEl.className = "correct";
      } else {
        feedbackEl.textContent = `❌ Incorrect, try again.`;
        feedbackEl.className = "incorrect";
      }
    };
  });
}

function newVenn() {
  vennData = randomVennData();
  drawVenn();
  document.getElementById('venn-desc').innerHTML =
    `<b>Total people: ${vennData.total}<br>
    Set A includes ${vennData.Aonly} only + ${vennData.overlap} both = <u>${vennData.Aonly + vennData.overlap}</u> people.<br>
    Set B includes ${vennData.Bonly} only + ${vennData.overlap} both = <u>${vennData.Bonly + vennData.overlap}</u> people.<br>
    Neither (complement): ${vennData.neither} people.</b>`;
  document.getElementById('venn-form').reset();
  document.getElementById('venn-feedback').textContent = "";

  generateVennProbabilityQuestions();
}

document.getElementById('new-venn').onclick = newVenn;
document.getElementById('reset-venn').onclick = () => {
  document.getElementById('venn-form').reset();
  document.getElementById('venn-feedback').textContent = "";
};

document.getElementById('venn-form').onsubmit = function(e){
  e.preventDefault();
  const guess = parseInt(document.getElementById('venn-overlap').value.trim());
  const feedback = document.getElementById('venn-feedback');
  if(isNaN(guess)){
    feedback.textContent = "Please enter a valid number.";
    feedback.className = "incorrect";
    return;
  }
  if(guess === vennData.overlap){
    feedback.textContent = "🎉 Correct!";
    feedback.className = "correct";
  } else {
    feedback.textContent = `❌ Incorrect, try again. Hint: The overlap is between Set A and Set B.`;
    feedback.className = "incorrect";
  }
};

newVenn();
</script>

</body>
</html>
